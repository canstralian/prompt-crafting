# Cloudflare deployment configuration
# This repository is built as a Pages-style static artifact (`dist`),
# with an assets fallback so Wrangler-based uploads have an explicit target.

name = "builder-prompt-engine"
compatibility_date = "2024-05-15"
pages_build_output_dir = "dist"

[assets]
directory = "./dist"

